<script>
  // Register Service Worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker
        .register('/sw.js')
        .then((reg) => {
          console.log('[FES] Service Worker registered:', reg.scope);
        })
        .catch((err) => {
          console.warn('[FES] Service Worker failed:', err);
        });
    });
  }
</script>
